name: CI

on:
  push:
    branches:
      - main
      - mcp-draft
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install . build

      - name: Verify console script is installed
        run: python -c "import shutil, sys; sys.exit(0 if shutil.which('kalshi-research-mcp') else 1)"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile core modules
        run: python -m py_compile backtest_engine.py backtest_config.py server.py download_market_archive.py tests/test_mcp_server.py tests/test_backtest_engine.py

      - name: Build distribution artifacts
        run: python -m build
